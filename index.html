<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Shopping Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛍️ AI Shopping Assistant</h1>
    <h3>Total: ₹<span id="total">0</span></h3>
<button onclick="goToCheckout()">Proceed to Checkout</button>
    <input type="text" id="search" placeholder="Search products...">
  <h1>🛍️ Shree Collection</h1>
  <p class="tagline">✨ Trendy Styles • Best Deals • Limited Offers</p>
  <button onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</button>
  </header>
<div class="stars"></div>
  <section id="products"></section>
<section class="low-price">
  <h2>💸 Lowest Price Zone</h2>
  <p>Grab the best deals before they’re gone!</p>
</section>
  <script src="script.js"></script>
  <!-- 🛒 Bottom Navigation -->
<div class="bottom-nav">
  <button onclick="scrollToTop()">🏠 Home</button>
  <button onclick="showWishlist()">❤️ Wishlist</button>
  <button onclick="toggleCart()">🛒 Cart</button>
</div>
  <div id="quickView" class="modal">
  <div class="modal-content">
    <span onclick="closeQuickView()" class="close">&times;</span>

    <img id="qv-image" src="" />

    <h2 id="qv-name"></h2>

    <p>
      <span id="qv-old" class="old-price"></span><br>
      <span id="qv-price" class="price"></span>
    </p>

    <!-- 👗 Size Selection -->
    <div class="sizes">
      <p>Select Size:</p>
      <button onclick="selectSize(this)">S</button>
      <button onclick="selectSize(this)">M</button>
      <button onclick="selectSize(this)">L</button>
      <button onclick="selectSize(this)">XL</button>
    </div>

    <button onclick="addToCartFromQuickView()">🛒 Add to Cart</button>
  </div>
  </div>
</body>
</html>
