<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Shopping Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛍️ AI Shopping Assistant</h1>
    <h3>Total: ₹<span id="total">0</span></h3>
<button onclick="goToCheckout()">Proceed to Checkout</button>
    <input type="text" id="search" placeholder="Search products...">
  <h1>🛍️ Shree Collection</h1>
  <p class="tagline">✨ Trendy Styles • Best Deals • Limited Offers</p>
  <button onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</button>
  </header>
<div class="stars"></div>
  <section id="products"></section>
<section class="low-price">
  <h2>💸 Lowest Price Zone</h2>
  <p>Grab the best deals before they’re gone!</p>
</section>
  <script src="script.js"></script>
  <!-- 🛒 Bottom Navigation -->
<div class="bottom-nav">
  <button onclick="scrollToTop()">🏠 Home</button>
  <button onclick="showWishlist()">❤️ Wishlist</button>
  <button onclick="toggleCart()">🛒 Cart</button>
</div>
</body>
</html>
